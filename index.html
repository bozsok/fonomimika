<!DOCTYPE html>
<html lang="hu">

<head>
    <meta charset="utf-8" />
    <meta content="width=device-width, initial-scale=1.0" name="viewport" />
    <title>Fonomimika Tanoda</title>
    <link
        href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;700;800&family=Literata:ital,wght@0,400;0,700;1,400&display=swap"
        rel="stylesheet" />
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap"
        rel="stylesheet" />
    <link rel="stylesheet" href="/style.css">
</head>

<body>
    <!-- Login Modal -->
    <div id="login-modal" class="login-modal">
        <div class="login-modal__card">
            <h1 class="login-modal__title">Fonomimika tanoda</h1>
            <p class="login-modal__subtitle">Kérlek, válaszd ki a neved a belépéshez!</p>

            <div class="login-modal__form">
                <label for="student-search" class="login-modal__label">Felhasználónév:</label>
                <div class="login-modal__input-wrapper">
                    <input type="text" id="student-search" class="login-modal__input" placeholder="Gépeld be a neved..."
                        autocomplete="off">
                    <div id="autocomplete-list" class="autocomplete-list">
                        <!-- Ide jönnek dinamikusan a találatok -->
                    </div>
                </div>

                <button id="login-btn" class="login-modal__btn" disabled>Belépés</button>
            </div>
        </div>
    </div>

    <!-- Avatar Selection Modal -->
    <div id="avatar-modal" class="login-modal" style="display: none;">
        <div class="login-modal__card login-modal__card--avatar">
            <h1 class="login-modal__title">Válassz avatart!</h1>
            <p class="login-modal__subtitle">Kattints arra a kis képre, amelyik a legjobban tetszik!</p>
            <div id="avatar-grid" class="avatar-grid">
                <!-- Ide kerülnek az avatarok JS-ből -->
            </div>
        </div>
    </div>

    <!-- Main App Content -->
    <div id="app-content">
        <!-- TopAppBar -->
        <header class="app-header">
            <div class="app-header__title app-header__title--primary">Fonomimika tanoda</div>
            <nav class="app-header__nav">
                <a href="#" class="app-header__nav-item app-header__nav-item--active">Tanítás</a>
                <a href="#" class="app-header__nav-item">Gyakorlás</a>
                <a href="#" class="app-header__nav-item">Haladás</a>
            </nav>
            <div class="app-header__actions">
                <button class="app-header__btn material-symbols-outlined">account_circle</button>
                <button class="app-header__btn material-symbols-outlined">settings</button>
            </div>
        </header>

        <div class="app-container">
            <!-- SideNavBar / Alphabet List -->
            <aside class="app-sidebar">
                <div class="app-sidebar__profile">
                    <div id="sidebar-user-info" class="app-sidebar__user-info">
                        <div class="app-sidebar__avatar">M</div>
                        <div>
                            <p class="app-sidebar__user-name">Szia, Marci!</p>
                            <p class="app-sidebar__user-goal" style="display: none;">Mai cél: 3 betű</p>
                        </div>
                    </div>
                    <!-- Progress Bar Block -->
                    <div class="progress-bar" style="display: none;">
                        <div class="progress-bar__bead progress-bar__bead--completed"></div>
                        <div class="progress-bar__bead progress-bar__bead--current"></div>
                        <div class="progress-bar__bead progress-bar__bead--pending"></div>
                        <div class="progress-bar__bead progress-bar__bead--pending"></div>
                        <div class="progress-bar__bead progress-bar__bead--pending"></div>
                    </div>
                </div>

                <!-- Alphabet Scroll Block -->
                <div class="alphabet-scroll">
                    <div class="alphabet-scroll__grid">
                        <button class="alphabet-scroll__btn alphabet-scroll__btn--active-primary">A</button>
                        <button class="alphabet-scroll__btn">Á</button>
                        <button class="alphabet-scroll__btn">B</button>
                        <button class="alphabet-scroll__btn">C</button>
                        <button class="alphabet-scroll__btn">Cs</button>
                        <button class="alphabet-scroll__btn">D</button>
                        <button class="alphabet-scroll__btn">Dz</button>
                        <button class="alphabet-scroll__btn">Dzs</button>
                        <button class="alphabet-scroll__btn">E</button>
                        <button class="alphabet-scroll__btn">É</button>
                        <button class="alphabet-scroll__btn">F</button>
                        <button class="alphabet-scroll__btn">G</button>
                        <button class="alphabet-scroll__btn">Gy</button>
                        <button class="alphabet-scroll__btn">H</button>
                        <button class="alphabet-scroll__btn">I</button>
                        <button class="alphabet-scroll__btn">Í</button>
                        <button class="alphabet-scroll__btn">J</button>
                        <button class="alphabet-scroll__btn">K</button>
                        <button class="alphabet-scroll__btn">L</button>
                        <button class="alphabet-scroll__btn">Ly</button>
                        <button class="alphabet-scroll__btn">M</button>
                        <button class="alphabet-scroll__btn">N</button>
                        <button class="alphabet-scroll__btn">Ny</button>
                        <button class="alphabet-scroll__btn">O</button>
                        <button class="alphabet-scroll__btn">Ó</button>
                        <button class="alphabet-scroll__btn">Ö</button>
                        <button class="alphabet-scroll__btn">Ő</button>
                        <button class="alphabet-scroll__btn">P</button>
                        <button class="alphabet-scroll__btn">Q</button>
                        <button class="alphabet-scroll__btn">R</button>
                        <button class="alphabet-scroll__btn">S</button>
                        <button class="alphabet-scroll__btn">Sz</button>
                        <button class="alphabet-scroll__btn">T</button>
                        <button class="alphabet-scroll__btn">Ty</button>
                        <button class="alphabet-scroll__btn">U</button>
                        <button class="alphabet-scroll__btn">Ú</button>
                        <button class="alphabet-scroll__btn">Ü</button>
                        <button class="alphabet-scroll__btn">Ű</button>
                        <button class="alphabet-scroll__btn">V</button>
                        <button class="alphabet-scroll__btn">W</button>
                        <button class="alphabet-scroll__btn">X</button>
                        <button class="alphabet-scroll__btn">Y</button>
                        <button class="alphabet-scroll__btn">Z</button>
                        <button class="alphabet-scroll__btn">Zs</button>
                    </div>
                </div>

                <div class="app-sidebar__footer" style="display: none;">
                    <button class="pressable-btn pressable-btn--help">
                        <span class="material-symbols-outlined">help_outline</span>
                        <span>Súgó</span>
                    </button>
                </div>
            </aside>

            <!-- Main Content Canvas -->
            <main class="app-main">
                <div class="app-main__content">
                    <!-- Learning Hero Section -->
                    <div class="learning-hero">

                        <!-- Top Row: Interactive Card + Mimicry -->
                        <div class="learning-hero__top">
                            <!-- The Interactive Letter Card -->
                            <div class="learning-hero__interactive">
                                <div class="interactive-card interactive-card--pattern">

                                    <!-- House Indicator (SVG) -->
                                    <svg class="house-indicator" viewBox="0 0 100 100" preserveAspectRatio="none">
                                        <!-- Tető (25-45) -->
                                        <polyline points="0,45 35,25 70,45 0,45" fill="none" stroke="#2c5e7a"
                                            stroke-width="2" vector-effect="non-scaling-stroke" />
                                        <!-- Fal (45-65.2) -->
                                        <rect x="0" y="45" width="70" height="20.4" fill="none" stroke="#2c5e7a"
                                            stroke-width="2" vector-effect="non-scaling-stroke" />
                                        <!-- Pince lépcső (65.2-85) -->
                                        <polyline points="70,65.4 70,75 100,75 100,85" fill="none" stroke="#2c5e7a"
                                            stroke-width="2" vector-effect="non-scaling-stroke" />
                                    </svg>

                                    <!-- Coverflow Scene -->
                                    <div class="coverflow-scene">
                                        <div class="coverflow" id="letter-coverflow">
                                            <div class="coverflow__item interactive-card__letter interactive-card__letter--print"
                                                data-position="active" id="face-0">A</div>
                                            <div class="coverflow__item interactive-card__letter interactive-card__letter--print"
                                                data-position="next" id="face-1">a</div>
                                            <div class="coverflow__item interactive-card__letter interactive-card__letter--script"
                                                data-position="hidden" id="face-2">A</div>
                                            <div class="coverflow__item interactive-card__letter interactive-card__letter--script"
                                                data-position="prev" id="face-3">a</div>
                                        </div>
                                    </div>

                                    <!-- Navigation Arrows -->
                                    <button class="coverflow-nav coverflow-nav--prev" id="coverflow-prev">
                                        <span class="material-symbols-outlined">chevron_left</span>
                                    </button>
                                    <button class="coverflow-nav coverflow-nav--next" id="coverflow-next">
                                        <span class="material-symbols-outlined">chevron_right</span>
                                    </button>

                                    <!-- Floating Actions (Pronounce) -->
                                    <button
                                        class="interactive-card__btn interactive-card__btn--pronounce interactive-card__btn--floating"
                                        id="btn-pronounce">
                                        <span class="material-symbols-outlined interactive-card__icon-bounce"
                                            style="font-variation-settings: 'FILL' 1;">volume_up</span>
                                    </button>
                                    <button class="interactive-card__btn interactive-card__btn--star"
                                        style="display: none;">
                                        <span class="material-symbols-outlined" style="font-size: 1.875rem;">star</span>
                                    </button>
                                </div>
                            </div>

                            <!-- Phonomimicry Gesture Image -->
                            <div class="learning-hero__media">
                                <div class="mimicry-card">
                                    <div class="mimicry-card__badge">A mozdulat</div>
                                    <div class="mimicry-card__media-wrapper">
                                        <img src="https://lh3.googleusercontent.com/aida-public/AB6AXuBVBIxgnCOyBcF0ITX2X4WJEhskgLi3ZrhGxJ-oHA04WmfWJLwuKrfFvJr0YXmoheBc1JMSF5UvsP_wKQbuKkoumrwKTJrWh0qy12xzAYYFVCMP8nhY5r9KKFq8uw0FfhQjT2D6ATgBkfNQsP4-Yjj3YZ_4RLDQLK3_sACBDaxbbd_aJWqZ39OJKfASFO_apbPwh-Djg0APO_vIOQdRWwiJyMU0P8mNcn3HIZkGn_IWuQ26MtFEZitxFAYoUEJseC6vwTV2P-43VjE"
                                            alt="Fonomimika mozdulat" class="mimicry-card__image">
                                    </div>
                                    <p class="mimicry-card__text">"Kerekítsük a szánkat!"</p>
                                </div>
                            </div>
                        </div>

                        <!-- Bottom Row: Instructional Video -->
                        <div class="learning-hero__bottom">
                            <div class="video-player">
                                <div class="video-player__overlay" id="video-overlay-btn">
                                    <span class="material-symbols-outlined video-player__icon">play_circle</span>
                                </div>
                                <video id="instructional-video" class="video-player__video">
                                    <source src="/assets/video/a.mp4" type="video/mp4">
                                    A böngésződ nem támogatja a videó lejátszását.
                                </video>
                            </div>
                        </div>

                    </div>

                    <!-- Bottom Gallery: Words starting with this letter -->
                    <section class="gallery">
                        <h2 class="gallery__title" id="gallery-title">A betűs szavak</h2>
                        <div class="gallery__grid" id="gallery-grid">
                            <!-- Ide kerülnek dinamikusan a kártyák a main.js-ből -->
                        </div>
                    </section>

                    <div class="app-main__padding-bottom"></div>
                </div>
            </main>
        </div>

        <!-- BottomNavBar -->
        <nav class="bottom-nav">
            <button class="bottom-nav__item bottom-nav__item--active">
                <span class="material-symbols-outlined">sort_by_alpha</span>
                <span class="bottom-nav__label">ABC</span>
            </button>
            <button class="bottom-nav__item">
                <span class="material-symbols-outlined">collections</span>
                <span class="bottom-nav__label">Galéria</span>
            </button>
            <button class="bottom-nav__item">
                <span class="material-symbols-outlined">smart_display</span>
                <span class="bottom-nav__label">Videók</span>
            </button>
            <button class="bottom-nav__item">
                <span class="material-symbols-outlined">military_tech</span>
                <span class="bottom-nav__label">Érmek</span>
            </button>
        </nav>

        <script type="module" src="/main.js"></script>
</body>

</html>
